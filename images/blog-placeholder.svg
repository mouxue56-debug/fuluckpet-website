<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="福楽キャッテリー ブログ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5ee"/>
      <stop offset="100%" stop-color="#cfe9d8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dbf95"/>
      <stop offset="100%" stop-color="#4f9e6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- soft circles -->
  <circle cx="980" cy="120" r="180" fill="#ffffff" fill-opacity="0.35"/>
  <circle cx="160" cy="540" r="220" fill="#ffffff" fill-opacity="0.25"/>
  <!-- cat silhouette (centered, simple) -->
  <g transform="translate(600 300)" fill="#3a6b4e">
    <!-- body -->
    <ellipse cx="0" cy="60" rx="120" ry="78"/>
    <!-- head -->
    <circle cx="0" cy="-30" r="78"/>
    <!-- ears -->
    <polygon points="-60,-90 -42,-30 -82,-50"/>
    <polygon points="60,-90 42,-30 82,-50"/>
    <!-- tail -->
    <path d="M115 60 Q 200 0 175 -60 Q 165 -85 145 -75" stroke="#3a6b4e" stroke-width="22" stroke-linecap="round" fill="none"/>
    <!-- eyes -->
    <circle cx="-26" cy="-32" r="6" fill="#fff"/>
    <circle cx="26" cy="-32" r="6" fill="#fff"/>
    <!-- nose -->
    <polygon points="0,-12 -5,-4 5,-4" fill="#fff"/>
    <!-- whiskers (subtle) -->
    <line x1="-30" y1="0" x2="-70" y2="-4" stroke="#fff" stroke-width="2"/>
    <line x1="-30" y1="6" x2="-70" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="30" y1="0" x2="70" y2="-4" stroke="#fff" stroke-width="2"/>
    <line x1="30" y1="6" x2="70" y2="10" stroke="#fff" stroke-width="2"/>
  </g>
  <!-- Title text -->
  <g font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" text-anchor="middle">
    <text x="600" y="500" font-size="56" font-weight="700" fill="#2d5a3f">福楽キャッテリー</text>
    <text x="600" y="555" font-size="28" font-weight="400" fill="#4f7d62">サイベリアン専門ブリーダー (大阪)</text>
  </g>
  <!-- accent bar -->
  <rect x="500" y="585" width="200" height="6" rx="3" fill="url(#accent)"/>
</svg>
