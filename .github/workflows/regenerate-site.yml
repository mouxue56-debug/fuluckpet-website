name: Regenerate Static Pages

on:
  repository_dispatch:
    types: [regenerate-site]
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = JST 03:00

# Prevent concurrent runs that race on git push.
concurrency:
  group: regenerate-site
  cancel-in-progress: false

jobs:
  regenerate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.node-version'

      - name: Regenerate static pages from API
        run: node tools/generate-site.js

      - name: Regenerate diary static pages from API
        run: node tools/generate-diary.js

      - name: Run complete regression suite
        run: node --test tests/*.test.js

      - name: Verify generated output (integrity gate — blocks bad deploys)
        run: node tools/verify-generated.js

      - name: Commit and push with retry (handles concurrent dispatch race)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit, skipping."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE=$(git rev-parse HEAD)
          git commit -m "Auto-regenerate static pages"

          # Retry push up to 5 times with rebase on rejection.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt rejected, rebasing..."
            git pull --rebase origin main || {
              echo "Rebase failed, aborting."
              git rebase --abort || true
              exit 1
            }

            # The base changed after our first green run. Regenerate and re-run every
            # gate against the rebased HEAD before another push attempt.
            node tools/generate-site.js
            node tools/generate-diary.js
            node --test tests/*.test.js
            node tools/verify-generated.js
            git add -A

            if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
              if git diff --staged --quiet; then
                echo "Concurrent push already contains the generated output; nothing left to push."
                echo "pushed=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              git commit -m "Auto-regenerate static pages"
            elif ! git diff --staged --quiet; then
              git commit --amend --no-edit
            fi
            BEFORE=$(git rev-parse HEAD^)
            sleep $((attempt * 3))
          done

          echo "Push failed after 5 attempts."
          exit 1

      # IndexNow: ping search engines with the .html pages that changed in the pushed
      # commit(s). Never fails the build (|| true, and the step itself does not error).
      - name: IndexNow ping (changed HTML only)
        if: steps.commit.outputs.pushed == 'true'
        env:
          INDEXNOW_KEY: 3e58aa9db1af85697843d7e987cbcc2d
          BEFORE_SHA: ${{ steps.commit.outputs.before }}
        run: |
          set -u
          # Changed .html files across everything pushed (BEFORE_SHA..HEAD covers the
          # local commit plus any rebased-in commits from the push retry loop).
          CHANGED=$(git diff --name-only "${BEFORE_SHA}" HEAD -- '*.html' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed .html files to submit; skipping IndexNow."
            exit 0
          fi

          # Map only indexable files to URLs. The shared robots-meta parser keeps
          # boarding and every dark-launch/noindex surface away from IndexNow.
          URLS=$(printf '%s\n' "$CHANGED" | node tools/indexnow-urls.js | head -100)

          COUNT=$(printf '%s\n' "$URLS" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "No URLs to submit; skipping IndexNow."
            exit 0
          fi
          echo "Submitting $COUNT URL(s) to IndexNow."

          # Build JSON urlList array.
          URLLIST=$(printf '%s\n' "$URLS" | awk 'BEGIN{ORS=""} NR>1{print ","} {gsub(/"/,"\\\"");print "\"" $0 "\""}')
          BODY=$(printf '{"host":"fuluckpet.com","key":"%s","keyLocation":"https://fuluckpet.com/%s.txt","urlList":[%s]}' \
            "$INDEXNOW_KEY" "$INDEXNOW_KEY" "$URLLIST")

          curl -sS -m 30 -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" || true
          echo "IndexNow ping done (non-blocking)."
