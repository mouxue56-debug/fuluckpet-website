<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>お預かりサービス準備中｜福楽キャッテリー</title>
  <meta name="description" content="お預かりサービスは現在準備中です。">
  <link rel="canonical" href="https://fuluckpet.com/boarding/estimate.html">
  <link rel="stylesheet" href="../style.css?v=20260711b">
  <style>
    .gate-main { min-height: 100dvh; display: grid; place-items: center; padding: 48px 20px; }
    .gate-card { width: min(680px, 100%); padding: clamp(28px, 7vw, 56px); background: var(--bg-white); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
    .gate-mark { width: 48px; height: 4px; border-radius: 999px; background: var(--mint-deep); margin-bottom: 24px; }
    .gate-card h1 { color: var(--ink); font-size: clamp(1.5rem, 5vw, 2.1rem); line-height: 1.4; margin-bottom: 16px; }
    .gate-card p { color: var(--ink-soft); line-height: 1.8; }
    .gate-languages { display: grid; gap: 20px; margin-top: 32px; padding-top: 28px; border-top: 1px solid var(--line); }
    .gate-language { display: grid; grid-template-columns: 2.5rem 1fr; gap: 12px; align-items: start; }
    .gate-language strong { color: var(--mint-deep); font-size: .82rem; letter-spacing: .08em; }
    .gate-home { display: inline-flex; margin-top: 32px; color: var(--mint-deep); font-weight: 600; text-decoration: underline; text-underline-offset: .2em; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">メインコンテンツへスキップ</a>
  <main class="gate-main" id="main">
    <section class="gate-card" aria-labelledby="gate-title">
      <div class="gate-mark" aria-hidden="true"></div>
      <h1 id="gate-title">お預かりサービスは現在準備中です。</h1>
      <p>必要な手続きとご案内の準備が整うまで、受付は行っておりません。</p>
      <div class="gate-languages">
        <div class="gate-language" lang="en"><strong>EN</strong><p>Our boarding service is currently in preparation. We are not accepting requests at this time.</p></div>
        <div class="gate-language" lang="zh"><strong>ZH</strong><p>寄养服务目前正在准备中。现阶段暂不接受申请。</p></div>
      </div>
      <a class="gate-home" href="/">福楽キャッテリーのトップへ戻る</a>
    </section>
  </main>
</body>
</html>
