<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ふくにゃん">
  <defs>
    <radialGradient id="fukuFur" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="60%" stop-color="#f6dfc1"/>
      <stop offset="100%" stop-color="#e9c39a"/>
    </radialGradient>
    <linearGradient id="fukuEar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffc7a8"/>
      <stop offset="100%" stop-color="#f29a78"/>
    </linearGradient>
  </defs>
  <!-- ears -->
  <path d="M16 14 L22 4 L28 18 Z" fill="url(#fukuEar)"/>
  <path d="M48 14 L42 4 L36 18 Z" fill="url(#fukuEar)"/>
  <path d="M19 14 L22.5 8 L26 17 Z" fill="#ffb494" opacity="0.55"/>
  <path d="M45 14 L41.5 8 L38 17 Z" fill="#ffb494" opacity="0.55"/>
  <!-- head -->
  <ellipse cx="32" cy="34" rx="22" ry="20" fill="url(#fukuFur)" stroke="#cba07a" stroke-width="0.7"/>
  <!-- cheeks blush -->
  <ellipse cx="18" cy="38" rx="4" ry="2.5" fill="#ffb6a3" opacity="0.55"/>
  <ellipse cx="46" cy="38" rx="4" ry="2.5" fill="#ffb6a3" opacity="0.55"/>
  <!-- eyes (closed-happy curves) -->
  <path d="M22 30 q3 -3 6 0" stroke="#3d3122" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M36 30 q3 -3 6 0" stroke="#3d3122" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M30 36 L34 36 L32 39 Z" fill="#e88d72"/>
  <!-- mouth -->
  <path d="M32 39 q-2 3 -4 2" stroke="#3d3122" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M32 39 q2 3 4 2" stroke="#3d3122" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <path d="M10 36 L18 36" stroke="#cba07a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M10 39 L18 38" stroke="#cba07a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M54 36 L46 36" stroke="#cba07a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M54 39 L46 38" stroke="#cba07a" stroke-width="0.8" stroke-linecap="round"/>
</svg>
