# 福楽キャッテリー — Cloudflare Workers 設定
# ドキュメント: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "fuluck-api"
main = "worker.js"
compatibility_date = "2024-09-23"
workers_dev = true

# 環境変数 (本番では Workers Settings > Variables で設定)
[vars]
# Default CORS origin for ADMIN/PRIVATE endpoints. Public endpoints are wide-open ('*')
# via corsForPublic() in worker.js — see corsForPrivate() for the locked-down whitelist.
CORS_ORIGIN = "https://fuluckpet.com"
DOG_SERVICES_PUBLIC = "false"
# Telegram fallback for booking notifications (optional). Leave blank to disable.
# TELEGRAM_BOT_TOKEN  = "..."   # via `wrangler secret put`
# TELEGRAM_CHAT_ID    = "..."   # via `wrangler secret put` (or vars)
# 以下のシークレットは `wrangler secret put` で設定してください（コードに書かないこと）:
#   ADMIN_PASSWORD            — 管理画面パスワード (legacy plain — DEPRECATED, use KV pw:hash)
#   GOOGLE_SA_KEY             — Google Service Account JSON（全内容をペースト）
#   GOOGLE_DRIVE_ROOT_FOLDER_ID — Google Drive ルートフォルダ ID
#   GEMINI_API_KEY             — Google Gemini API Key（ストーリーカードAI生成用 + chat fallback 2）
#   QIANWEN_API_KEY            — Alibaba Qianwen API Key（ストーリーカードAI生成用）
#   TELEGRAM_BOT_TOKEN         — Telegram bot token for booking + chat-sync + lead alerts
#   TELEGRAM_CHAT_ID           — Telegram chat id for booking + chat-sync + lead alerts
#   KIMI_API_KEY               — **PRIMARY** chat (Kimi CodingPlan, kimi-k2.6, Anthropic format)
#   MINIMAX_API_KEY            — **fallback 1** chat (MiniMax CodingPlan, MiniMax-M2.7-highspeed, Anthropic format, may emit thinking blocks)
#   INFI_API_KEY               — **fallback 2** chat (Infini-AI deepseek-v3.2-thinking, OpenAI Chat Completions format)
#   DASHSCOPE_QWEN36_KEY       — fallback 3 chat (DashScope qwen3.6-plus, optional)
#   GEMINI_API_KEY             — fallback 4 chat + Story Card AI (Google Gemini)

# R2 バケット (画像ストレージ)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "fuluck-images"
# preview_bucket_name = "fuluck-images-dev"  # ローカル開発用

# KV Namespace (データストア)
[[kv_namespaces]]
binding = "DATA"
id = "d319e99874ef40d5b5836587edfee243"
# preview_id = "YOUR_KV_PREVIEW_ID_HERE"  # ローカル開発用

# Exact tombstone for a legacy owner-gated pricing asset that was once published
# with an immutable one-year cache policy. The source file is deleted; this route
# makes the bare cached URL fail closed without widening the Worker over the site.
[[routes]]
pattern = "fuluckpet.com/boarding-config.js"
zone_name = "fuluckpet.com"

# デプロイ手順:
# 1. npm install -g wrangler
# 2. wrangler login
# 3. wrangler r2 bucket create fuluck-images
# 4. wrangler kv namespace create DATA
#    → 返された id を上の id = "..." に貼り付け
# 5. wrangler deploy
# 6. Workers Settings > Variables で ADMIN_PASSWORD を設定
